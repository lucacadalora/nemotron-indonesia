# Pre-training configuration for Nemotron-Indonesia
# Continued pre-training on Indonesian corpus

model:
  name: "nvidia/nemotron-3-8b-base-4k"
  trust_remote_code: true
  torch_dtype: "bfloat16"

data:
  sources:
    - oscar
    - cc100
    - wikipedia
  min_length: 100
  max_length: 4096
  dedup_threshold: 0.85

training:
  mode: "pretrain"
  output_dir: "./models/nemotron-indonesia-8b-pretrain"
  
  # Batch configuration
  per_device_batch_size: 4
  gradient_accumulation_steps: 4
  num_epochs: 1
  
  # Learning rate
  learning_rate: 2.0e-5
  warmup_steps: 1000
  weight_decay: 0.01
  max_grad_norm: 1.0
  
  # Optimization
  optimizer: "adamw_torch"
  lr_scheduler: "cosine"
  
  # Precision
  bf16: true
  fp16: false
  gradient_checkpointing: true
  
  # Logging
  logging_steps: 10
  eval_steps: 500
  save_steps: 1000
  save_total_limit: 3
  
  # Distributed
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  
  # Reporting
  report_to: ["tensorboard"]

# H200 specific optimizations
hardware:
  gpu_type: "H200"
  gpu_count: 8
  vram_per_gpu: 141
  flash_attention: true
  
# Estimated resources
resources:
  total_tokens: 20_000_000_000  # 20B tokens
  estimated_time: "2 days"
  memory_per_gpu: "~60GB"
