# Pre-training configuration for Nemotron-Indonesia Omni
# Indonesian text continued pre-training/adaptation on Omni base

model:
  name: "nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-BF16"
  trust_remote_code: true
  torch_dtype: "bfloat16"

data:
  sources:
    - oscar
    - cc100
    - wikipedia
  min_length: 100
  max_length: 8192
  dedup_threshold: 0.85

training:
  mode: "pretrain"
  output_dir: "./models/nemotron-indonesia-omni-30b-pretrain"
  
  # Batch configuration (Omni 30B-A3B; validate memory before full run)
  per_device_batch_size: 2
  gradient_accumulation_steps: 8
  num_epochs: 1
  
  # Learning rate (lower for larger model)
  learning_rate: 1.5e-5
  warmup_steps: 1000
  weight_decay: 0.01
  max_grad_norm: 1.0
  
  # Optimization
  optimizer: "adamw_torch"
  lr_scheduler: "cosine"
  
  # Precision
  bf16: true
  fp16: false
  gradient_checkpointing: true
  
  # Logging
  logging_steps: 10
  eval_steps: 500
  save_steps: 1000
  save_total_limit: 2  # 30B checkpoints are large
  
  # Distributed
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  
  # Reporting
  report_to: ["tensorboard"]

  # DeepSpeed
  deepspeed: "./configs/deepspeed_zero3.json"

# H200 specific optimizations
hardware:
  gpu_type: "H200"
  gpu_count: 8
  vram_per_gpu: 141
  flash_attention: true
  
# Estimated resources for 30B
resources:
  total_tokens: 20_000_000_000  # 20B tokens
  estimated_time: "3 days"
  memory_per_gpu: "~100GB"
  checkpoint_size: "~62GB+ per checkpoint"
