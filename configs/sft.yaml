# Supervised Fine-Tuning configuration for Nemotron-Indonesia Omni
# Instruction tuning on Indonesian tasks

model:
  name: "./models/nemotron-indonesia-omni-30b-pretrain"  # Continue from pre-trained checkpoint
  trust_remote_code: true
  torch_dtype: "bfloat16"

data:
  sources:
    - indommlu
    - nusax
    - custom_instructions
  max_length: 8192
  chat_template: true

training:
  mode: "sft"
  output_dir: "./models/nemotron-indonesia-omni-30b-sft"
  
  # Batch configuration (Omni 30B-A3B; validate memory before full run)
  per_device_batch_size: 2
  gradient_accumulation_steps: 8
  num_epochs: 3
  
  # Learning rate (lower for fine-tuning 30B)
  learning_rate: 3.0e-6
  warmup_steps: 100
  weight_decay: 0.01
  max_grad_norm: 1.0
  
  # Optimization
  optimizer: "adamw_torch"
  lr_scheduler: "cosine"
  
  # Precision
  bf16: true
  fp16: false
  gradient_checkpointing: true
  
  # Logging
  logging_steps: 10
  eval_steps: 200
  save_steps: 500
  save_total_limit: 2
  
  # Reporting
  report_to: ["tensorboard"]

  # DeepSpeed
  deepspeed: "./configs/deepspeed_zero3.json"

hardware:
  gpu_type: "H200"
  gpu_count: 8
  vram_per_gpu: 141
  flash_attention: true

resources:
  estimated_time: "12 hours"
  memory_per_gpu: "~100GB"
